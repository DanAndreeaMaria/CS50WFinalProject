{% extends "wellnest/layout.html" %}

{% block body %}

    <div class="flex-form">
        <h2 class="page-title">Log In</h2>

        {% if message %}
            <div>{{ message }}</div>
        {% endif %}

        <!-- Login form -->
        <form action="{% url 'login' %}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <input class="form-control" autofocus type="text" name="username" placeholder="Username">
            </div>
            <div class="form-group">
                <input class="form-control" name="password" type="password" placeholder="Password">
            </div>
            <input class="btn btn-custom-color" type="submit" value="Login">
        </form>

        <h6 class="account-check">Don't you have an account? <a class="custom-link" href="{% url 'register' %}">Register here.</a></h6>
    </div>
    
{% endblock %}
